# ---------------------------------------------------------------------------
# Test configuration — overrides application.properties for all test runs.
# No @ActiveProfiles annotation needed on test classes.
# ---------------------------------------------------------------------------

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — Hibernate manages schema; Flyway is not used in tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway — disabled; schema is handled by Hibernate ddl-auto above
spring.flyway.enabled=false

# Alert webhook — test value; not called in unit/integration tests
alarm.webhook.url=http://localhost:9090/webhook/alert
