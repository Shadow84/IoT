# ---------------------------------------------------------------------------
# Local development profile — overrides application.properties
# Run with: gradlew bootRun --args='--spring.profiles.active=local'
# ---------------------------------------------------------------------------

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate — let Hibernate manage the schema; Flyway not used locally
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — disabled; Hibernate create-drop handles the schema for local dev
spring.flyway.enabled=false
